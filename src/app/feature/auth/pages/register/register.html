<div class="register-page">
  <div class="background-blur blur-1"></div>
  <div class="background-blur blur-2"></div>
  <div class="background-blur blur-3"></div>

  <div class="register-container">
    <div class="brand-panel">
      <h1>ShopZy</h1>
      <p>
        Create your account and start exploring products, orders and personalized recommendations.
      </p>

      <div class="feature-list">
        <div class="feature">
          <span>✓</span>
          <p>Fast & Secure Authentication</p>
        </div>

        <div class="feature">
          <span>✓</span>
          <p>Google & GitHub Sign In</p>
        </div>

        <div class="feature">
          <span>✓</span>
          <p>Modern Shopping Experience</p>
        </div>
      </div>
    </div>

    <div class="register-card">
      @if (error$ | async; as error) {
        @if (error) {
          <div class="error-message">
            {{ error }}
          </div>
        }
      }

      <h2>Create Account</h2>

      <form [formGroup]="RegistrationForm" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <input type="text" formControlName="username" placeholder=" " />
          <label>Username</label>
        </div>

        <div class="input-group">
          <input type="email" formControlName="email" placeholder=" " />
          <label>Email Address</label>
        </div>

        <div class="input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder=" "
          />
          <label>Password</label>

          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <button type="submit" class="primary-btn" [disabled]="(loading$ | async) || false">
          @if (loading$ | async) {
            Creating Account...
          } @else {
            Create Account
          }
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <button class="social-btn github" (click)="onloginWithGithubClicked()">
        Login with GitHub
      </button>

      <button class="social-btn google" (click)="onloginWithGoogleClicked()">
        Login with Google
      </button>

      <div class="footer-link">
        Already have an account?

        <button class="text-btn" (click)="onLoginClicked()">Sign In</button>
      </div>
    </div>
  </div>
</div>
