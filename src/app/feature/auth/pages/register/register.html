<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      @if (error$ | async; as error) {
        @if (error) {
          <div class="error-message">
            {{ error }}
          </div>
        }
      }

      <div class="logo">
        <img src="assets/icons/ShopZy_Logo_Light.png" alt="ShopZy Logo" />
      </div>

      <h1>ShopZy</h1>

      <div class="card-header">
        <h2>Create Account</h2>
        <p>Start your ShopZy journey today</p>
      </div>

      <form [formGroup]="RegistrationForm" (ngSubmit)="onSubmit()">
        <!-- <div class="input-group">
          <label for="username">Username</label>

          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Enter username"
          />
        </div> -->
        <div class="input-group">
          <label for="fName">First Name</label>

          <input
            id="fName"
            type="text"
            formControlName="fName"
            placeholder="Enter your first name here"
          />

          <small
            *ngIf="
              RegistrationForm.get('fName')?.touched &&
              RegistrationForm.get('fName')?.hasError('required')
            "
          >
            First name is required
          </small>

          <small
            *ngIf="
              RegistrationForm.get('fName')?.touched &&
              RegistrationForm.get('fName')?.hasError('pattern')
            "
          >
            Only letters are allowed
          </small>
        </div>

        <div class="input-group">
          <label for="lName">Last Name</label>

          <input
            id="lName"
            type="text"
            formControlName="lName"
            placeholder="Enter your last name here"
          />

          <small
            *ngIf="
              RegistrationForm.get('lName')?.touched &&
              RegistrationForm.get('lName')?.hasError('required')
            "
          >
            Last name is required
          </small>

          <small
            *ngIf="
              RegistrationForm.get('lName')?.touched &&
              RegistrationForm.get('lName')?.hasError('pattern')
            "
          >
            Only letters are allowed
          </small>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>

          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter email address"
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter password"
            />

            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        <button type="submit" class="primary-btn" [disabled]="(loading$ | async) || false">
          @if (loading$ | async) {
            Creating Account...
          } @else {
            Create Account
          }
        </button>
      </form>

      <div class="divider">
        <span>OR CONTINUE WITH</span>
      </div>

      <div class="social-buttons">
        <button type="button" class="social-btn google" (click)="onloginWithGoogleClicked()">
          Continue with Google
        </button>

        <button type="button" class="social-btn github" (click)="onloginWithGithubClicked()">
          Continue with GitHub
        </button>
      </div>

      <div class="footer-link">
        Already have an account?

        <button type="button" class="text-btn" (click)="onLoginClicked()">Sign In</button>
      </div>
    </div>
  </div>
</div>
